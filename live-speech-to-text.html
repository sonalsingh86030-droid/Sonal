<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Speech-to-Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px 25px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 12px;
        }

        .lang-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .lang-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .lang-btn:hover {
            color: #667eea;
        }

        .status {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-bottom: 25px;
            height: 20px;
            min-height: 20px;
        }

        .status.listening {
            color: #667eea;
            font-weight: 600;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .mic-button-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            text-align: center;
            padding: 20px;
            line-height: 1.3;
        }

        .mic-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .mic-btn:active {
            transform: translateY(-2px);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #f5576c;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.3);
            animation: recordingPulse 1.5s infinite;
        }

        @keyframes recordingPulse {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 10px 40px rgba(245, 87, 108, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.4);
            }
        }

        .text-area {
            width: 100%;
            min-height: 150px;
            max-height: 200px;
            padding: 16px;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
            color: #333;
            transition: border-color 0.3s ease;
            margin-bottom: 16px;
        }

        .text-area:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-copy {
            background: #667eea;
            color: white;
        }

        .btn-copy:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-copy:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #f5f5f5;
            color: #666;
        }

        .btn-clear:hover {
            background: #efefef;
            transform: translateY(-2px);
        }

        .btn-clear:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border-left: 4px solid #f5576c;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .copy-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .copy-feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .interim-text {
            color: #999;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 18px;
                border-radius: 16px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .mic-btn {
                width: 120px;
                height: 120px;
                font-size: 16px;
            }

            .text-area {
                min-height: 120px;
                font-size: 15px;
                padding: 14px;
            }

            .btn {
                padding: 12px;
                font-size: 13px;
            }

            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Live Speech</h1>

        <div class="language-toggle">
            <button class="lang-btn active" data-lang="en-IN">
                English - India
            </button>
            <button class="lang-btn" data-lang="hi-IN">
                हिंदी
            </button>
        </div>

        <div class="status" id="status"></div>
        <div class="error-message" id="errorMsg"></div>

        <div class="mic-button-container">
            <button class="mic-btn" id="micBtn" title="Tap to start speaking">
                🎤 TAP TO<br>SPEAK
            </button>
        </div>

        <textarea class="text-area" id="textArea" placeholder="Your transcribed text will appear here..." readonly></textarea>

        <div class="button-group">
            <button class="btn btn-copy" id="copyBtn">📋 Copy</button>
            <button class="btn btn-clear" id="clearBtn">🗑️ Clear</button>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">✓ Copied to clipboard!</div>

    <script>
        // Configuration
        const CONFIG = {
            langs: {
                'en-IN': 'English - India',
                'hi-IN': 'हिंदी'
            }
        };

        // State
        let currentLang = 'en-IN';
        let isListening = false;
        let recognition = null;
        let interimTranscript = '';
        let finalTranscript = '';

        // Initialize Speech Recognition API
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showError('Web Speech API not supported in this browser.');
                return false;
            }

            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = currentLang;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                updateUI();
                document.getElementById('status').textContent = 'Listening...';
                document.getElementById('status').classList.add('listening');
            };

            recognition.onresult = (event) => {
                interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                updateTextArea();
            };

            recognition.onerror = (event) => {
                let errorMsg = 'Error occurred in recognition: ' + event.error;
                
                if (event.error === 'network') {
                    errorMsg = 'Network error. Check your internet connection.';
                } else if (event.error === 'no-speech') {
                    errorMsg = 'No speech detected. Please try again.';
                } else if (event.error === 'audio-capture') {
                    errorMsg = 'No microphone found. Please check your device.';
                } else if (event.error === 'not-allowed') {
                    errorMsg = 'Microphone access was denied. Please allow access.';
                }

                showError(errorMsg);
                stopListening();
            };

            recognition.onend = () => {
                isListening = false;
                updateUI();
                document.getElementById('status').textContent = '';
                document.getElementById('status').classList.remove('listening');
            };

            return true;
        }

        // Update text area with interim and final transcripts
        function updateTextArea() {
            const textArea = document.getElementById('textArea');
            const displayText = finalTranscript + '<span class="interim-text">' + interimTranscript + '</span>';
            textArea.innerHTML = finalTranscript + interimTranscript;
            textArea.scrollTop = textArea.scrollHeight;
        }

        // Update UI based on listening state
        function updateUI() {
            const micBtn = document.getElementById('micBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');

            if (isListening) {
                micBtn.classList.add('recording');
                micBtn.innerHTML = '🔴 LISTENING...';
                copyBtn.disabled = true;
                clearBtn.disabled = true;
            } else {
                micBtn.classList.remove('recording');
                micBtn.innerHTML = '🎤 TAP TO<br>SPEAK';
                copyBtn.disabled = false;
                clearBtn.disabled = false;
            }
        }

        // Start/Stop listening
        function toggleListening() {
            if (!recognition) {
                if (!initSpeechRecognition()) return;
            }

            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            interimTranscript = '';
            recognition.lang = currentLang;
            recognition.start();
        }

        function stopListening() {
            recognition.stop();
        }

        // Show error message
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');

            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        // Copy to clipboard
        function copyToClipboard() {
            const textArea = document.getElementById('textArea');
            const text = textArea.value;

            if (!text.trim()) {
                showError('Nothing to copy!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showCopyFeedback();
            }).catch(() => {
                showError('Failed to copy. Please try again.');
            });
        }

        // Show copy feedback
        function showCopyFeedback() {
            const feedback = document.getElementById('copyFeedback');
            feedback.classList.add('show');

            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000);
        }

        // Clear text
        function clearText() {
            if (isListening) {
                stopListening();
            }

            finalTranscript = '';
            interimTranscript = '';
            document.getElementById('textArea').value = '';
            document.getElementById('errorMsg').classList.remove('show');
        }

        // Change language
        function changeLanguage(lang) {
            currentLang = lang;

            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Stop current listening if active
            if (isListening) {
                stopListening();
                setTimeout(() => {
                    startListening();
                }, 500);
            }
        }

        // Event listeners
        document.getElementById('micBtn').addEventListener('click', toggleListening);
        document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
        document.getElementById('clearBtn').addEventListener('click', clearText);

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                changeLanguage(e.target.dataset.lang);
            });
        });

        // Initialize on load
        window.addEventListener('load', () => {
            initSpeechRecognition();
        });
    </script>
</body>
</html>
